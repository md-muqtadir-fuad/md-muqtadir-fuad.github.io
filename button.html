<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect with Me</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Source Code Pro', sans-serif;
      background-color: #000;
      color: #fff;
    }

    .connect {
      text-align: center;
      padding: 40px 20px;
    }

    .connect h2 {
      color: #6e0303;
      font-size: 1.8rem;
      margin-bottom: 15px;
      border-bottom: 2px solid #6e0303;
      display: inline-block;
      padding-bottom: 6px;
    }

    .social-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 25px;
    }

    .social-links a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 15px;
      background-color: #111;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      font-size: 14px;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .social-links a:hover {
      background-color: #6e0303;
      transform: translateY(-3px);
    }

    .social-links i {
      font-size: 16px;
    }

    /* Mobile View */
    /* @media (max-width: 600px) {
      .social-links {
        flex-direction: column;
        align-items: center;
      }
      .social-links a {
        width: 80%;
        font-size: 16px;
        justify-content: center;
      }
    } */
  </style>
</head>
<body>

  <section class="connect">
    <h2>Connect with me</h2>
    <div class="social-links">
      <a href="mailto:example@email.com"><i class="fa-solid fa-envelope"></i> Mail</a>
      <a href="cv.pdf" target="_blank"><i class="fa-solid fa-file"></i> CV</a>
      <a href="#" target="_blank"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
      <a href="#" target="_blank"><i class="fa-brands fa-google"></i> Google Scholar</a>
      <a href="#" target="_blank"><i class="fa-solid fa-flask"></i> ResearchGate</a>
      <a href="#" target="_blank"><i class="fa-solid fa-id-card"></i> ORCID</a>
      <a href="#" target="_blank"><i class="fa-brands fa-github"></i> GitHub</a>
      <a href="#" target="_blank"><i class="fa-brands fa-facebook"></i> Facebook</a>
      <a href="#" target="_blank"><i class="fa-solid fa-cube"></i> GrabCAD</a>
      <a href="#" target="_blank"><i class="fa-brands fa-kaggle"></i> Kaggle</a>
    </div>
  </section>

</body>
</html>
